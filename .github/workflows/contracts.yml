name: Contracts CI

on:
  pull_request:
    paths:
      - 'Contracts/**'
      - '.github/workflows/contracts.yml'
  push:
    branches: [main]
    paths:
      - 'Contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cd Contracts && cargo test --all
