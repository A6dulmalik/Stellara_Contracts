name: Backend Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json
        
    - name: Install Dependencies
      run: npm ci
      working-directory: Backend
      
    - name: Run ESLint
      run: npm run lint
      working-directory: Backend
      
    - name: Check Formatting
      run: npx prettier --check "src/**/*.ts"
      working-directory: Backend

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json
      
    - name: Install Dependencies
      run: npm ci
      working-directory: Backend
      
    - name: Run Tests
      run: npm test
      working-directory: Backend

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json
      
    - name: Install Dependencies
      run: npm ci
      working-directory: Backend
      
    - name: Build Project
      run: npm run build
      working-directory: Backend
