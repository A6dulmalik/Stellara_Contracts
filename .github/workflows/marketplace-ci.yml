name: Backend CI

on:
  push:
    paths:
      - 'Backend/**'
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: Backend
      - name: Build
        run: npm run build
        working-directory: Backend
      - name: Run unit tests
        run: npm test
        working-directory: Backend
