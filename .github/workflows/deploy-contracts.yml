name: Backend Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: Backend

      - name: Run Backend Tests
        run: npm test
        working-directory: Backend

      - name: Build Backend
        run: npm run build
        working-directory: Backend

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: Backend/dist/
          retention-days: 7

  deploy:
    name: Deploy Backend
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: Backend/dist/

      - name: Deploy Backend Application
        env:
          NODE_ENV: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          echo "Deploying backend application..."
          # Add actual deployment commands here

      - name: Upload deployment logs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs-${{ github.run_id }}
          path: |
            deployment.log
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed on ${{ github.event.inputs.environment || 'staging' }}"

  monitor:
    name: Post-deployment Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Run health checks
        run: |
          echo "Running health checks for deployed backend..."
          # Add health check commands here
          # Example: curl -f https://api.example.com/health || exit 1

      - name: Report deployment summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY